name: FMGE Debug Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Assemble debug APK
        run: ./gradlew :AnkiDroid:assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ankifmge-debug-apk
          path: AnkiDroid/build/outputs/apk/**/*.apk
