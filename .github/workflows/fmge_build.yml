name: FMGE APK Build

on:
  push:
    branches:
      - fmge-custom
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: jetbrains
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :AnkiDroid:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AnkiFMGE-Debug
          path: AnkiDroid/build/outputs/apk/**/*.apk
